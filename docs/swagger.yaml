                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/sds-admin_internal_dto.ErrorResponse'
      summary: List all domains
      tags:
      - domains
    post:
      consumes:
      - application/json
      description: Create a new domain with the provided information
      parameters:
      - description: Domain creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/sds-admin_internal_dto.CreateDomainRequest'
      produces:
      - application/json
      responses:
        "201":
