basePath: /api/v1
definitions:
  sds-admin_internal_dto.CreateDomainRequest:
    properties:
      description:
        type: string
      domainName:
        type: string
      recursive:
        type: boolean
    required:
    - domainName
    type: object
  sds-admin_internal_dto.CreateRecordRequest:
    properties:
      host:
        description: |-
          Host record, e.g. www, @, *.
          主机记录，如 www, @, *
        example: www
        type: string
      mxPriority:
        description: |-
          MX record priority. Only required for MX records, value range 0-65535.
          MX记录优先级。仅MX记录需要，取值范围0-65535
        example: 10
        type: integer
      recordTypeId:
        description: |-
          Record type ID (1=A, 2=AAAA, 3=CNAME, 4=MX, etc.).
          记录类型ID（1=A, 2=AAAA, 3=CNAME, 4=MX等）
        example: 1
        type: integer
      remark:
        description: |-
          Remark or description for this record.
          记录的备注或说明
        example: Web server
        type: string
      ttl:
        description: |-
          Time to live in seconds. Default is 300.
          生存时间（秒），默认为300
        example: 300
        type: integer
      values:
        description: |-
          Record values. At least one value is required.
          记录值列表。至少需要一个值
        items:
          $ref: '#/definitions/sds-admin_internal_dto.RecordValueInput'
        minItems: 1
        type: array
    required:
    - host
    - recordTypeId
    - values
    type: object
  sds-admin_internal_dto.CreateRecordTypeRequest:
    properties:
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 20
        type: string
    required:
    - name
    type: object
  sds-admin_internal_dto.DomainResponse:
    properties:
      createdAt:
        type: string
      description:
        type: string
      domainName:
        type: string
      id:
        type: integer
      recursive:
        type: boolean
      status:
        type: string
      updatedAt:
        type: string
    type: object
  sds-admin_internal_dto.ErrorResponse:
    properties:
      code:
        type: integer
      detail:
        type: string
      message:
        type: string
    type: object
  sds-admin_internal_dto.RecordListResponse:
    properties:
      records:
        description: |-
          Record list.
          记录列表
        items:
          $ref: '#/definitions/sds-admin_internal_dto.RecordResponse'
        type: array
      total:
        description: |-
          Total number of records.
          记录总数
        example: 10
        type: integer
    type: object
  sds-admin_internal_dto.RecordResponse:
    properties:
      createdAt:
        description: |-
          Creation time.
          创建时间
        example: "2024-01-01 12:00:00"
        type: string
      disabled:
        description: |-
          Whether the record is disabled.
          记录是否禁用
        example: false
        type: boolean
      domainId:
        description: |-
          Domain ID that this record belongs to.
          此记录所属的域名ID
        example: 1
        type: integer
      domainName:
        description: |-
          Domain name.
          域名
        example: example.com
        type: string
      host:
        description: |-
          Host record.
          主机记录
        example: www
        type: string
      id:
        description: |-
          Record ID.
          记录ID
        example: 1
        type: integer
      mxPriority:
        description: |-
          MX record priority. Only present for MX records.
          MX记录优先级。仅MX记录有此字段
        example: 10
        type: integer
      recordType:
        description: |-
          Record type name (A, AAAA, CNAME, MX, etc.).
          记录类型名称（A, AAAA, CNAME, MX等）
        example: A
        type: string
      recordTypeId:
        description: |-
          Record type ID.
          记录类型ID
        example: 1
        type: integer
      remark:
        description: |-
          Remark or description.
          备注或说明
        example: Web server
        type: string
      ttl:
        description: |-
          Time to live in seconds.
          生存时间（秒）
        example: 300
        type: integer
      updatedAt:
        description: |-
          Last update time.
          最后更新时间
        example: "2024-01-01 12:00:00"
        type: string
      values:
        description: |-
          Record values.
          记录值列表
        items:
          $ref: '#/definitions/sds-admin_internal_dto.RecordValueResponse'
        type: array
    type: object
  sds-admin_internal_dto.RecordTypeResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  sds-admin_internal_dto.RecordValueInput:
    properties:
      clientCidr:
        description: |-
          Client IP CIDR for smart DNS resolution. Should not be set for default values.
          客户端IP网段，用于智能DNS解析。默认值不应设置此字段
          @example 192.168.1.0/24
        example: 192.168.1.0/24
        type: string
      isDefault:
        description: |-
          Whether this is the default value. Required for A/AAAA/CNAME records.
          是否为默认值。A/AAAA/CNAME记录必须有一个默认值
        example: true
        type: boolean
      value:
        description: |-
          Record value, e.g. IP address for A record, domain for CNAME.
          记录值，如A记录的IP地址，CNAME记录的域名
          @example 192.168.1.1
        example: 192.168.1.1
        type: string
    required:
    - value
    type: object
  sds-admin_internal_dto.RecordValueResponse:
    properties:
      clientCidr:
        description: |-
          Client IP CIDR for smart DNS resolution.
          客户端IP网段，用于智能DNS解析
        example: 192.168.1.0/24
        type: string
      id:
        description: |-
          Record value ID.
          记录值ID
        example: 1
        type: integer
      isDefault:
        description: |-
          Whether this is the default value.
          是否为默认值
        example: true
        type: boolean
      value:
        description: |-
          Record value.
          记录值
        example: 192.168.1.1
        type: string
    type: object
  sds-admin_internal_dto.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  sds-admin_internal_dto.UpdateDomainConfigRequest:
    properties:
      description:
        type: string
      recursive:
        type: boolean
    type: object
  sds-admin_internal_dto.UpdateRecordRequest:
    properties:
      disabled:
        description: |-
          Whether the record is disabled.
          记录是否禁用
        example: false
        type: boolean
      host:
        description: |-
          Host record, e.g. www, @, *.
          主机记录，如 www, @, *
        example: www
        type: string
      mxPriority:
        description: |-
          MX record priority. Only required for MX records, value range 0-65535.
          MX记录优先级。仅MX记录需要，取值范围0-65535
        example: 10
        type: integer
      remark:
        description: |-
          Remark or description for this record.
          记录的备注或说明
        example: Web server
        type: string
      ttl:
        description: |-
          Time to live in seconds. Default is 300.
          生存时间（秒），默认为300
        example: 300
        type: integer
      values:
        description: |-
          Record values. At least one value is required.
          记录值列表。至少需要一个值
        items:
          $ref: '#/definitions/sds-admin_internal_dto.RecordValueInput'
        minItems: 1
        type: array
    required:
    - host
    - values
    type: object
  sds-admin_internal_dto.UpdateRecordTypeRequest:
    properties:
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 20
        type: string
    type: object
host: localhost:8080
